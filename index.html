<!doctype html>
<html lang="vi" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <title>AIO Digital Solutions — Giải pháp công nghệ số toàn diện</title>
    <meta
      name="description"
      content="AIO Digital Solutions — Sản xuất, thi công và cho thuê màn hình LED, giải pháp Smart City, Camera AI, IoT, chuyển đổi số cho doanh nghiệp và tổ chức."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AIO Digital Solutions" />
    <meta
      property="og:description"
      content="Giải pháp công nghệ số toàn diện: LED Display, Smart City, AI Camera, IoT."
    />
    <meta property="og:image" content="/images/banners/og-default.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Be+Vietnam+Pro:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply saved theme/lang before paint to avoid a flash (default: dark / vi).
      try {
        var t = JSON.parse(localStorage.getItem('aio.theme') || '"dark"');
        document.documentElement.classList.remove('dark', 'light');
        document.documentElement.classList.add(t === 'light' ? 'light' : 'dark');
        document.documentElement.style.colorScheme = t === 'light' ? 'light' : 'dark';
        var l = JSON.parse(localStorage.getItem('aio.lang') || '"vi"');
        document.documentElement.lang = l === 'en' ? 'en' : 'vi';
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
